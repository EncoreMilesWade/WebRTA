<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="./favicon_32x32.svg" />
<title>Web Audio Spectrum Analyzer</title>
<style>
  body { margin:0; font-family:sans-serif; background:#111; color:#fff; overflow:hidden; }
  canvas { display:block; width:100vw; height:100vh; touch-action: manipulation; }

  .copyright-overlay { position: fixed; right: 12px; bottom: 12px; z-index: 9999; pointer-events: none;}
  .copyright-card { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; padding: 8px 12px; border-radius: 14px; background: rgba(0, 0, 0, 0.45); border: 1px solid rgba(255, 255, 255, 0.10); backdrop-filter: blur(8px);}
  .copyright-logo { opacity: 0.8; height: auto; width: 8vmin; min-width: 36px; max-width: 307px;}
  .copyright-text { font-size: 11px; color: rgba(255, 255, 255, 0.8);}
  
  #pausenote { position: absolute; top: 10px; left:50%; transform: translateX(-50%); font-size: 20px; text-align:center; display:none; z-index:5; background: rgba(0,0,0,0.5); padding: 4px 10px; border-radius:4px; }
  #info { position:absolute; top:10px; left:10px; font-size:32px; font-family:monospace; line-height:1.2; text-align:right; }
  #hamburger { position:absolute; top:10px; right:10px; font-size:24px; cursor:pointer; }
  #settings { position:absolute; top:40px; right:10px; background:#222; padding:10px; border-radius:5px; display:none; }
  select { margin-top:5px; }
  #welcome { text-align:center; position:absolute; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.9); color:#fff;
             display:flex; align-items:center; justify-content:center; flex-direction:column; font-size:20px; }
  #welcome button { margin-top:20px; padding:10px 20px; font-size:18px; cursor:pointer; }
  #pausedOverlay {position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: black; color: yellow; padding: 20px 40px; font-size: 32px; font-weight: bold; border: 2px solid yellow; display: none;	z-index: 20;}
  


</style>
</head>
<body>

<div id="welcome">
  <div>Welcome! </br>
  First, approve access to the microphone.</br>
  Click "OK" to start.
  </div>
  <button id="startBtn">OK</button>
</div>

<div id="pausenote">Click or tap on the screen to pause/freeze the display.</div>

<div id="info">Strongest: -- Hz</div>
<div id="hamburger">&#9776;</div>
<div id="settings">
  <label><input type="checkbox" id="hpfToggle"> High-pass filter</label>
  <br>
  <select id="hpfFreq">
    <option value="60">60 Hz</option>
    <option value="120">120 Hz</option>
    <option value="250">250 Hz</option>
    <option value="400">400 Hz</option>
  </select>
</div>


<div class="copyright-overlay">
  <div class="copyright-card">
    <img src="logo_white.png" alt="Encore" class="copyright-logo" />
    <div class="copyright-text">
      &copy; 2026 Encore. For internal use only.
    </div>
  </div>
</div>


<canvas id="canvas"></canvas>

<div id="pausedOverlay">PAUSED</div>


<script>
(async function(){
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const info = document.getElementById('info');
  const hamburger = document.getElementById('hamburger');
  const settings = document.getElementById('settings');
  const hpfToggle = document.getElementById('hpfToggle');
  const hpfFreq = document.getElementById('hpfFreq');
  const welcome = document.getElementById('welcome');
  const startBtn = document.getElementById('startBtn');
  const pausenote = document.getElementById('pausenote');

  let running = false;
  let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  let source, analyser, hpf;

  let fftSize = window.innerWidth < 600 ? 1024 : 2048;
  let smoothingTime = 0.7;

  // Microphone access immediately
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio:true });
    source = audioCtx.createMediaStreamSource(stream);
  } catch(e) {
    alert('Microphone access denied or not supported');
    console.error(e);
    return;
  }

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  analyser = audioCtx.createAnalyser();
  analyser.fftSize = fftSize;
  analyser.smoothingTimeConstant = smoothingTime;

  function setupHPF() {
    hpf = audioCtx.createBiquadFilter();
    hpf.type = 'highpass';
    hpf.frequency.value = parseFloat(hpfFreq.value);
  }
  setupHPF();

  function connectAudio() {
    try {
		source.disconnect();
		if (hpf) hpf.disconnect();
		} catch(e) {
		}
		
	if(hpfToggle.checked) {
	source.connect(hpf);
	hpf.connect(analyser);
    } else  {
	source.connect(analyser);
	}
  }
  connectAudio();

  hpfToggle.addEventListener('change', connectAudio);
  hpfFreq.addEventListener('change', () => {
    if(hpf) hpf.frequency.value = parseFloat(hpfFreq.value);
  });

  hamburger.addEventListener('click', () => {
    settings.style.display = settings.style.display === 'none' ? 'block' : 'none';
  });

const pausedOverlay = document.getElementById('pausedOverlay');

  canvas.addEventListener('click', () => {
    running = !running;
	
    if(running) {
	audioCtx.resume();
	pausedOverlay.style.display = 'none';
    } else {
		audioCtx.suspend();
		pausedOverlay.style.display = 'block';
	}
  });

  startBtn.addEventListener('click', () => {
	
	welcome.style.display = 'none';
	
	pausenote.style.display = 'block';
	
	audioCtx.resume();
		
    setTimeout(() => {
		running = true;
		draw();
	}, 300);
  });

  function draw() {
    console.log('drawing frame');
	if(!running) { requestAnimationFrame(draw); return; }

    const width = canvas.width;
    const height = canvas.height;
    ctx.fillStyle = '#111';
    ctx.fillRect(0,0,width,height);

    const data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(data);

    const sampleRate = audioCtx.sampleRate;

    // Strongest frequency only
    let maxIndex = 0;
    for(let i=0;i<data.length;i++){
      if(data[i] > data[maxIndex]) maxIndex = i;
    }
    const strongestFreq = Math.round(maxIndex*sampleRate/analyser.fftSize);
    info.textContent = `Strongest: ${strongestFreq} Hz`;

    // Draw grid
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1;
    ctx.beginPath();

    // X-axis lines and labels
    const minFreq = 20;
    const maxFreq = 20000;
    const freqs = [];
    for(let f=10; f<100; f+=10) freqs.push(f);
    for(let f=100; f<1000; f+=100) freqs.push(f);
    for(let f=1000; f<10000; f+=1000) freqs.push(f);
    freqs.push(20000);

    ctx.fillStyle = '#fff';
    ctx.font = '12px sans-serif';
    freqs.forEach(f => {
      const x = Math.log10(f/minFreq)/Math.log10(maxFreq/minFreq)*width;
      ctx.moveTo(x,0);
      ctx.lineTo(x,height);
      ctx.fillText(f>=1000?f/1000+'k':f, x+2, height-2);
    });

    // Y-axis lines every 10 dB
    for(let db=0; db<=255; db+=32){
      const y = height - db/255*height;
      ctx.moveTo(0,y);
      ctx.lineTo(width,y);
      ctx.fillText(`${Math.round(db/255*80)} dB`, 5, y-2);
    }
    ctx.stroke();

    // Draw spectrum
    ctx.strokeStyle = '#0f0';
    ctx.lineWidth = 2;
    ctx.beginPath();
    for(let i=0;i<data.length;i++){
      const freq = i*sampleRate/analyser.fftSize;
      if(freq<minFreq) continue;
      const x = Math.log10(freq/minFreq)/Math.log10(maxFreq/minFreq)*width;
      const y = height - (data[i]/255)*height;
      if(i===0) ctx.moveTo(x,y);
      else ctx.lineTo(x,y);
    }
    ctx.stroke();

    requestAnimationFrame(draw);
  }
})();
</script>

</body>
</html>
